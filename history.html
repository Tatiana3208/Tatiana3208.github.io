<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>История и Законы — Карточки</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c872;
    --red: #e84040;
    --green: #3ecf74;
    --text: #f0ece4;
    --muted: #7a7570;
    --blue: #4a8cff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.5;
  }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ===== MENU ===== */
  #menu {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
  }
  .menu-deco {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
    pointer-events: none;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .menu-inner {
    text-align: center;
    position: relative;
    z-index: 1;
    max-width: 680px;
    width: 100%;
  }
  .menu-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    margin-bottom: 28px;
  }
  .menu-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(40px, 8vw, 80px);
    font-weight: 900;
    line-height: 1;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--text) 0%, var(--gold-light) 50%, var(--text) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .menu-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 52px;
    letter-spacing: 0.5px;
  }

  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 32px;
  }
  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 20px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }
  .topic-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, var(--gold) 0%, transparent 50%);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .topic-card:hover { border-color: var(--gold); transform: translateY(-2px); }
  .topic-card:hover::before { opacity: 0.05; }
  .topic-card.selected { border-color: var(--gold); background: var(--surface2); }
  .topic-card.selected::before { opacity: 0.08; }
  .topic-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .topic-name {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.4;
  }
  .topic-count {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .start-btn {
    background: var(--gold);
    color: #0d0d0d;
    border: none;
    padding: 16px 52px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.2s;
    display: inline-block;
  }
  .start-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .select-all-btn {
    background: transparent;
    color: var(--gold);
    border: 1px solid var(--gold);
    padding: 10px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    margin-right: 12px;
  }
  .select-all-btn:hover { background: rgba(201,168,76,0.1); }

  .btn-row { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 12px; }

  /* ===== STUDY SCREEN ===== */
  #study {
    padding: 0;
    flex-direction: column;
  }
  .study-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .back-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 18px; cursor: pointer; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--text); color: var(--text); }
  .progress-info {
    display: flex; gap: 24px; align-items: center;
  }
  .prog-stat {
    text-align: center;
  }
  .prog-num {
    display: block;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }
  .prog-label {
    display: block;
    font-size: 10px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .prog-num.gold { color: var(--gold); }
  .prog-num.green { color: var(--green); }
  .prog-num.red { color: var(--red); }

  .progress-bar-wrap {
    height: 3px;
    background: var(--border);
    flex-shrink: 0;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transition: width 0.4s ease;
  }

  .study-main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card-container {
    perspective: 1000px;
    width: 100%;
    max-width: 680px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 48px 48px 36px;
    position: relative;
    animation: cardIn 0.35s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: none; }
  }
  .card.correct-flash { animation: correctFlash 0.5s ease; }
  .card.wrong-flash { animation: wrongFlash 0.5s ease; }
  @keyframes correctFlash {
    0% { border-color: var(--border); }
    30% { border-color: var(--green); box-shadow: 0 0 32px rgba(62,207,116,0.25); }
    100% { border-color: var(--border); }
  }
  @keyframes wrongFlash {
    0% { border-color: var(--border); }
    30% { border-color: var(--red); box-shadow: 0 0 32px rgba(232,64,64,0.25); }
    100% { border-color: var(--border); }
  }

  .card-topic-tag {
    position: absolute;
    top: 20px; right: 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid rgba(201,168,76,0.3);
    padding: 4px 10px;
  }
  .srss-indicator {
    position: absolute;
    top: 20px; left: 20px;
    display: flex; gap: 4px;
  }
  .srs-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
  }
  .srs-dot.filled { background: var(--gold); }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 400;
    line-height: 1.5;
    margin-bottom: 6px;
    margin-top: 20px;
    color: var(--text);
  }

  .question-translation {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: clamp(13px, 2vw, 16px);
    font-weight: 300;
    font-style: italic;
    color: var(--muted);
    line-height: 1.4;
    margin-bottom: 32px;
  }

  .options-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    line-height: 1.4;
    transition: all 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct {
    border-color: var(--green);
    background: rgba(62,207,116,0.12);
    color: var(--green);
  }
  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(232,64,64,0.12);
    color: var(--red);
  }
  .option-letter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    min-width: 22px;
    opacity: 0.5;
    padding-top: 2px;
    flex-shrink: 0;
  }
  .option-btn.correct .option-letter,
  .option-btn.wrong .option-letter { opacity: 1; }

  .option-text-wrap {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .option-main {
    font-size: 15px;
    line-height: 1.4;
  }
  .option-es {
    font-size: 12px;
    font-style: italic;
    opacity: 0.55;
    line-height: 1.3;
  }
  .option-btn.correct .option-es,
  .option-btn.wrong .option-es { opacity: 0.75; }

  .feedback-row {
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .feedback-msg {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .feedback-msg.correct { color: var(--green); }
  .feedback-msg.wrong { color: var(--red); }
  .next-btn {
    background: var(--gold);
    color: #0d0d0d;
    border: none;
    padding: 12px 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .next-btn:hover { background: var(--gold-light); }

  .srs-info {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* ===== RESULTS ===== */
  #results {
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }
  .results-inner {
    max-width: 560px;
    width: 100%;
    text-align: center;
  }
  .results-icon {
    font-size: 64px;
    margin-bottom: 24px;
    display: block;
    animation: bounceIn 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }
  @keyframes bounceIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .results-title {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .results-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 40px;
  }

  .results-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--border);
    margin-bottom: 32px;
  }
  .result-stat {
    background: var(--surface);
    padding: 28px 20px;
    text-align: center;
  }
  .result-stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-stat-num.green { color: var(--green); }
  .result-stat-num.red { color: var(--red); }
  .result-stat-num.gold { color: var(--gold); }
  .result-stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .result-btns {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .result-btn {
    padding: 14px 36px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-weight: 500;
  }
  .result-btn.primary { background: var(--gold); color: #0d0d0d; }
  .result-btn.primary:hover { background: var(--gold-light); }
  .result-btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .result-btn.secondary:hover { border-color: var(--text); }

  .srs-note {
    margin-top: 24px;
    padding: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    font-family: 'IBM Plex Mono', monospace;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- MENU -->
<div id="menu" class="screen active">
  <div class="menu-deco"></div>
  <div class="menu-inner">
    <div class="menu-badge">Интервальное повторение</div>
    <h1 class="menu-title">История<br>и Законы</h1>
    <p class="menu-subtitle">Выберите темы для изучения</p>

    <div class="topics-grid" id="topics-grid"></div>

    <div class="btn-row">
      <button class="select-all-btn" onclick="toggleAll()">Выбрать все</button>
      <button class="start-btn" id="start-btn" onclick="startStudy()" disabled>Начать →</button>
    </div>
  </div>
</div>

<!-- STUDY -->
<div id="study" class="screen">
  <div class="study-header">
    <button class="back-btn" onclick="goMenu()">← Меню</button>
    <div class="progress-info">
      <div class="prog-stat">
        <span class="prog-num gold" id="stat-current">0</span>
        <span class="prog-label">Вопрос</span>
      </div>
      <div class="prog-stat">
        <span class="prog-num" id="stat-total">0</span>
        <span class="prog-label">Всего</span>
      </div>
      <div class="prog-stat">
        <span class="prog-num green" id="stat-correct">0</span>
        <span class="prog-label">Верно</span>
      </div>
      <div class="prog-stat">
        <span class="prog-num red" id="stat-wrong">0</span>
        <span class="prog-label">Неверно</span>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div class="study-main">
    <div class="card-container">
      <div class="card" id="card">
        <div class="srss-indicator" id="srs-dots"></div>
        <div class="card-topic-tag" id="card-topic"></div>
        <div class="question-text" id="question-text"></div>
        <div class="question-translation" id="question-translation"></div>
        <div class="options-list" id="options-list"></div>
        <div class="feedback-row" id="feedback-row" style="display:none">
          <div>
            <div class="feedback-msg" id="feedback-msg"></div>
            <div class="srs-info" id="srs-info"></div>
          </div>
          <button class="next-btn" onclick="nextCard()" id="next-btn">Далее →</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="results-inner">
    <span class="results-icon" id="results-icon">🏆</span>
    <h2 class="results-title" id="results-title">Готово!</h2>
    <p class="results-subtitle" id="results-subtitle">Сессия завершена</p>
    <div class="results-stats">
      <div class="result-stat">
        <div class="result-stat-num green" id="res-correct">0</div>
        <div class="result-stat-label">Верно</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-num red" id="res-wrong">0</div>
        <div class="result-stat-label">Неверно</div>
      </div>
      <div class="result-stat">
        <div class="result-stat-num gold" id="res-pct">0%</div>
        <div class="result-stat-label">Результат</div>
      </div>
    </div>
    <div class="srs-note" id="srs-note"></div>
    <br>
    <div class="result-btns">
      <button class="result-btn primary" onclick="startStudy()">Повторить снова</button>
      <button class="result-btn secondary" onclick="goMenu()">← Меню</button>
    </div>
  </div>
</div>

<script>
// ===== ALL QUESTIONS DATA =====
// Each question now has:
//   q       — Russian question text
//   qes     — Spanish translation of the question
//   options — Russian answer options
//   optEs   — Spanish translations of the answer options (same order)
//   answer  — index of correct answer
const ALL_QUESTIONS = [
  // Task 22 — Early Russian History
  { topic: "22 — Древняя Русь", q: "В 862 г. был призван на княжение", qes: "En el año 862 fue llamado a reinar", options: ["Олег", "Владимир", "Рюрик"], optEs: ["Oleg", "Vladímir", "Riúrik"], answer: 2 },
  { topic: "22 — Древняя Русь", q: "Киевский князь Владимир в конце X в.", qes: "El príncipe de Kiev Vladímir a finales del siglo X", options: ["освободил Москву от интервентов", "разгромил врагов в Ледовом побоище", "крестил Русь"], optEs: ["liberó Moscú de los interventores", "derrotó a los enemigos en la Batalla del Hielo", "bautizó a la Rus"], answer: 2 },
  { topic: "22 — Древняя Русь", q: "Крещение Руси состоялось", qes: "El bautismo de la Rus tuvo lugar", options: ["в 988 г.", "в 1812 г.", "в 1917 г."], optEs: ["en el año 988", "en el año 1812", "en el año 1917"], answer: 0 },
  { topic: "22 — Древняя Русь", q: "К XVIII в. относится правление", qes: "Al siglo XVIII pertenece el reinado de", options: ["Екатерины II", "Ивана Грозного", "Дмитрия Донского"], optEs: ["Catalina II", "Iván el Terrible", "Dmitri Donskói"], answer: 0 },
  { topic: "22 — Древняя Русь", q: "Русским войском в Куликовской битве командовал", qes: "El ejército ruso en la Batalla de Kulikovo fue comandado por", options: ["Иван Грозный", "Дмитрий Донской", "Александр Невский"], optEs: ["Iván el Terrible", "Dmitri Donskói", "Alejandro Nevski"], answer: 1 },
  { topic: "22 — Древняя Русь", q: "Призвание варягов на Русь произошло", qes: "La llamada de los varegos a la Rus ocurrió", options: ["в 862 г.", "в 988 г.", "в 1380 г."], optEs: ["en el año 862", "en el año 988", "en el año 1380"], answer: 0 },
  { topic: "22 — Древняя Русь", q: "В 862 г. произошло", qes: "En el año 862 ocurrió", options: ["призвание варягов на Русь", "сражение на Куликовом поле", "освобождение Москвы от польско-литовских интервентов"], optEs: ["la llamada de los varegos a la Rus", "la batalla en el campo de Kulikovo", "la liberación de Moscú de los interventores polaco-lituanos"], answer: 0 },
  { topic: "22 — Древняя Русь", q: "В правление Екатерины II русская армия побеждала под командованием", qes: "Durante el reinado de Catalina II, el ejército ruso venció bajo el mando de", options: ["П.А. Столыпина", "А.В. Суворова", "Г.К. Жукова"], optEs: ["P. A. Stolypin", "A. V. Suvórov", "G. K. Zhúkov"], answer: 1 },

// ===== SRS SYSTEM =====
const SRS_KEY = 'srs_history_law_v2';
let srsData = {};
try { srsData = JSON.parse(localStorage.getItem(SRS_KEY) || '{}'); } catch(e) {}

function saveSRS() {
  try { localStorage.setItem(SRS_KEY, JSON.stringify(srsData)); } catch(e) {}
}

function getCardSRS(idx) {
  return srsData[idx] || { level: 0, nextReview: 0, correct: 0, wrong: 0 };
}

function updateSRS(idx, wasCorrect) {
  const card = getCardSRS(idx);
  const now = Date.now();
  if (wasCorrect) {
    card.correct++;
    card.level = Math.min(card.level + 1, 5);
    const intervals = [1, 2, 4, 8, 16, 32];
    card.nextReview = now + intervals[card.level] * 60000;
  } else {
    card.wrong++;
    card.level = Math.max(0, card.level - 1);
    card.nextReview = now + 60000;
  }
  srsData[idx] = card;
  saveSRS();
  return card;
}

function getDueCards(indices) {
  const now = Date.now();
  const due = [];
  const notYet = [];
  indices.forEach(idx => {
    const s = getCardSRS(idx);
    if (s.nextReview <= now) due.push(idx);
    else notYet.push(idx);
  });
  due.sort((a,b) => getCardSRS(a).level - getCardSRS(b).level);
  return { due, notYet };
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ===== TOPICS =====
const topicMap = {};
ALL_QUESTIONS.forEach((q, idx) => {
  if (!topicMap[q.topic]) topicMap[q.topic] = [];
  topicMap[q.topic].push(idx);
});

const topics = Object.keys(topicMap);
let selectedTopics = new Set();

function buildTopicsGrid() {
  const grid = document.getElementById('topics-grid');
  grid.innerHTML = '';
  topics.forEach(topic => {
    const indices = topicMap[topic];
    const now = Date.now();
    const dueCount = indices.filter(i => getCardSRS(i).nextReview <= now).length;
    const div = document.createElement('div');
    div.className = 'topic-card';
    div.onclick = () => toggleTopic(topic, div);
    div.innerHTML = `
      <div class="topic-num">${topic.split('—')[0].trim()}</div>
      <div class="topic-name">${topic.split('—')[1]?.trim() || topic}</div>
      <div class="topic-count">${dueCount}/${indices.length} к повторению</div>
    `;
    div.dataset.topic = topic;
    grid.appendChild(div);
  });
}

function toggleTopic(topic, el) {
  if (selectedTopics.has(topic)) {
    selectedTopics.delete(topic);
    el.classList.remove('selected');
  } else {
    selectedTopics.add(topic);
    el.classList.add('selected');
  }
  document.getElementById('start-btn').disabled = selectedTopics.size === 0;
}

function toggleAll() {
  if (selectedTopics.size === topics.length) {
    selectedTopics.clear();
    document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('start-btn').disabled = true;
  } else {
    topics.forEach(t => selectedTopics.add(t));
    document.querySelectorAll('.topic-card').forEach(c => c.classList.add('selected'));
    document.getElementById('start-btn').disabled = false;
  }
}

// ===== STUDY SESSION =====
let queue = [];
let sessionIdx = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let answered = false;

function startStudy() {
  if (selectedTopics.size === 0) return;

  let allIndices = [];
  selectedTopics.forEach(t => { allIndices = allIndices.concat(topicMap[t]); });

  const { due, notYet } = getDueCards(allIndices);
  const newCards = notYet.slice(0, Math.max(5, Math.ceil(due.length * 0.3)));
  queue = shuffle([...due, ...newCards]);

  if (queue.length === 0) {
    queue = shuffle([...allIndices]);
  }

  sessionIdx = 0;
  sessionCorrect = 0;
  sessionWrong = 0;

  showScreen('study');
  showCard();
}

function showCard() {
  if (sessionIdx >= queue.length) {
    showResults();
    return;
  }
  answered = false;
  const idx = queue[sessionIdx];
  const q = ALL_QUESTIONS[idx];
  const srs = getCardSRS(idx);

  document.getElementById('stat-current').textContent = sessionIdx + 1;
  document.getElementById('stat-total').textContent = queue.length;
  document.getElementById('stat-correct').textContent = sessionCorrect;
  document.getElementById('stat-wrong').textContent = sessionWrong;
  document.getElementById('progress-fill').style.width = (sessionIdx / queue.length * 100) + '%';

  const dots = document.getElementById('srs-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 5; i++) {
    const d = document.createElement('div');
    d.className = 'srs-dot' + (i < srs.level ? ' filled' : '');
    dots.appendChild(d);
  }

  document.getElementById('card-topic').textContent = q.topic.replace(/\d+ — /, '');
  document.getElementById('question-text').textContent = q.q;
  document.getElementById('question-translation').textContent = q.qes;

  const list = document.getElementById('options-list');
  list.innerHTML = '';
  const letters = ['А', 'Б', 'В', 'Г'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    const esText = q.optEs && q.optEs[i] ? `<span class="option-es">${q.optEs[i]}</span>` : '';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span class="option-text-wrap"><span class="option-main">${opt}</span>${esText}</span>`;
    btn.onclick = () => selectAnswer(i, btn);
    list.appendChild(btn);
  });

  document.getElementById('feedback-row').style.display = 'none';

  const card = document.getElementById('card');
  card.classList.remove('correct-flash', 'wrong-flash');
  void card.offsetWidth;
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';
}

function selectAnswer(chosen, btn) {
  if (answered) return;
  answered = true;

  const idx = queue[sessionIdx];
  const q = ALL_QUESTIONS[idx];
  const correct = q.answer;
  const isCorrect = chosen === correct;

  const btns = document.querySelectorAll('.option-btn');
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === correct) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
  });

  const card = document.getElementById('card');
  card.classList.remove('correct-flash', 'wrong-flash');
  void card.offsetWidth;
  card.classList.add(isCorrect ? 'correct-flash' : 'wrong-flash');

  const updated = updateSRS(idx, isCorrect);

  if (isCorrect) sessionCorrect++;
  else sessionWrong++;

  const fbMsg = document.getElementById('feedback-msg');
  fbMsg.className = 'feedback-msg ' + (isCorrect ? 'correct' : 'wrong');
  fbMsg.textContent = isCorrect ? '✓ Правильно!' : '✗ Неверно';

  const srsInfo = document.getElementById('srs-info');
  const levelNames = ['Новое', 'Начало', 'Знакомое', 'Хорошо', 'Отлично', 'Мастерство'];
  srsInfo.textContent = `Уровень: ${levelNames[updated.level]}`;

  document.getElementById('feedback-row').style.display = 'flex';
  document.getElementById('next-btn').focus();
}

function nextCard() {
  sessionIdx++;
  showCard();
}

function showResults() {
  const pct = queue.length > 0 ? Math.round(sessionCorrect / queue.length * 100) : 0;
  document.getElementById('res-correct').textContent = sessionCorrect;
  document.getElementById('res-wrong').textContent = sessionWrong;
  document.getElementById('res-pct').textContent = pct + '%';

  let icon = '📚', title = 'Продолжайте!';
  if (pct >= 90) { icon = '🏆'; title = 'Отлично!'; }
  else if (pct >= 70) { icon = '⭐'; title = 'Хорошо!'; }
  else if (pct >= 50) { icon = '📖'; title = 'Неплохо!'; }
  document.getElementById('results-icon').textContent = icon;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = `Правильных ответов: ${sessionCorrect} из ${queue.length}`;

  let allIndices = [];
  selectedTopics.forEach(t => { allIndices = allIndices.concat(topicMap[t]); });
  const now = Date.now();
  const dueNext = allIndices.filter(i => getCardSRS(i).nextReview <= now + 24*60*60*1000).length;
  document.getElementById('srs-note').textContent = `На повторение завтра: ${dueNext} карточек. Система интервального повторения автоматически планирует следующий сеанс.`;

  showScreen('results');
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name).classList.add('active');
}

function goMenu() {
  buildTopicsGrid();
  showScreen('menu');
}

// Init
buildTopicsGrid();
</script>
</body>
